{% extends "base.html" %}

{% block title %}Demo Interactiva - Dra. Sabrinsky Flores{% endblock %}

{% block content %}
<div class="animate-up" style="max-width: 600px; margin: 4rem auto; text-align: center; padding: 0 1rem;">
    <h1 class="font-outfit" style="font-size: 2.75rem; color: var(--primary); margin-bottom: 2rem;">Simulador de Agente</h1>
    <p style="margin-bottom: 3rem; color: var(--text-muted);">Prueba cómo nuestra IA conversa con tus pacientes de forma natural.</p>
    
    <div class="whatsapp-widget" style="max-width: 450px; margin: 0 auto; background: #ffffff; border: 12px solid var(--primary); border-top: 40px solid var(--primary);">
        <div id="chat-box" style="height: 400px; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; border-bottom: 1px solid var(--border);">
            <!-- Messages go here -->
        </div>
        <div style="display: flex; padding: 1rem; background: #f3f4f6;">
            <input type="text" id="chat-input" placeholder="Escribe tu mensaje..." style="flex: 1; padding: 1rem; border: none; border-radius: 20px; outline: none;">
            <button onclick="handleSend()" class="cta-button" style="padding: 1rem; border: none; margin-left: 0.5rem; background: #25d366;"><img src="https://img.icons8.com/material-rounded/24/ffffff/sent.png"></button>
        </div>
    </div>
</div>

<script>
let step = 0;
let data = {};

function addMessage(text, isBot) {
    const chatBox = document.getElementById("chat-box");
    const div = document.createElement("div");
    div.innerText = text;
    div.className = isBot ? "chat-bubble bot" : "chat-bubble";
    if (!isBot) {
        div.style.alignSelf = "flex-end";
        div.style.background = "#dcf8c6";
        div.style.borderBottomRightRadius = "2px";
    }
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

async function handleSend() {
    const input = document.getElementById("chat-input");
    const text = input.value.trim();
    if (!text) return;
    
    addMessage(text, false);
    input.value = "";
    
    setTimeout(async () => {
        if (step === 0) {
            addMessage("¡Hola! 👋 Soy el asistente virtual de la Dra. Sabrinsky. ¿En qué puedo ayudarte?", true);
            step++;
        } else if (step === 1) {
            data.servicio = text;
            addMessage("Perfecto 😊 ¿Para qué fecha te gustaría agendar tu " + text + "?", true);
            step++;
        } else if (step === 2) {
            data.fecha = text;
            addMessage("Excelente. Disponible para el " + text + ": 3:00 PM y 5:30 PM. ¿Cuál prefieres?", true);
            step++;
        } else if (step === 3) {
            data.hora = text;
            addMessage("Entendido 👍 Finalmente, ¿cuál es tu nombre completo?", true);
            step++;
        } else if (step === 4) {
            data.nombre = text;
            addMessage("¡Un placer, " + text + "! Estoy confirmando tu cita en el calendario...", true);
            
            // Call Real API
            await fetch('/api/cita', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    nombre: data.nombre,
                    telefono: "Demo-User",
                    servicio: data.servicio,
                    fecha: data.fecha,
                    hora: data.hora
                })
            });

            addMessage("✅ ¡Cita Confirmada! Te esperamos el día " + data.fecha + " a las " + data.hora + ".", true);
            step++;
        }
    }, 800);
}

// Initial Greeting
setTimeout(() => addMessage("¡Hola! 👋 Soy el asistente virtual de la Dra. Sabrinsky. ¿Qué tratamiento te interesa hoy?", true), 500);
</script>
{% endblock %}
